# AIgriculture — one-command launcher.
#
#   cp .env.example .env
#   docker compose up -d
#
# Then open http://<your-pi-ip>:8000 and log in with the ADMIN_USER /
# ADMIN_PASS you set in .env.
#
# This compose file is "cameraless by default" so it boots on a laptop with
# no Pi cameras plugged in. To enable cameras, uncomment the `devices:` block
# and pass --input /dev/video0 in the `command:` block.

services:
  db:
    image: mariadb:11
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: ${DB_NAME:-plantmonitor}
      MARIADB_USER:     ${DB_USER:-plantmonitor}
      MARIADB_PASSWORD: ${DB_PASS:?DB_PASS must be set in .env}
      MARIADB_ROOT_PASSWORD: ${DB_PASS:?DB_PASS must be set in .env}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 12

  app:
    build: .
    image: aigriculture:latest
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file: .env
    environment:
      DB_HOST: db
    ports:
      - "8000:8000"
    volumes:
      - ./Storage_Data:/app/Storage_Data
      - ./FarmMonitor_Work:/app/FarmMonitor_Work
      - ./runtime:/app/runtime
      # Drop a wiring.yaml beside docker-compose.yml to override hardware pins.
      # - ./wiring.yaml:/app/wiring.yaml:ro
    # Uncomment to bind a real camera and the I2C/GPIO buses on a Pi:
    # devices:
    #   - /dev/video0:/dev/video0
    #   - /dev/i2c-1:/dev/i2c-1
    #   - /dev/gpiochip0:/dev/gpiochip0
    # group_add:
    #   - "video"
    #   - "i2c"
    #   - "gpio"
    # command: ["python", "plantwatch.py", "--input", "/dev/video0"]

volumes:
  db_data:
