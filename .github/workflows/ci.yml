name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-smoke:
    name: Lint + import smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python (latest, no pin)
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"
          cache: pip

      - name: Install minimal deps (web + config only, no hardware/ML)
        run: |
          python -m pip install --upgrade pip
          pip install fastapi 'uvicorn[standard]' python-multipart PyJWT bcrypt PyYAML requests 'passlib[bcrypt]'

      - name: Compile-check every Python file
        run: python -m compileall -q .

      - name: Import smoke test (no Pi hardware, no ML deps)
        run: |
          python - <<'PY'
          import sys, types
          # Stub heavy / hardware-only modules so main.py imports cleanly in CI.
          for name in [
            "lgpio", "smbus2", "picamera2", "cv2", "numpy", "ultralytics",
            "openai", "meshtastic", "meshtastic.tcp_interface", "pubsub",
            "apscheduler", "reportlab", "hailo_platform",
            "gi", "gi.repository", "hailo",
            "hailo_apps", "hailo_apps.python", "hailo_apps.python.core",
            "hailo_apps.python.core.gstreamer",
            "hailo_apps.python.core.gstreamer.gstreamer_app",
            "hailo_apps.python.core.common",
            "hailo_apps.python.core.common.hailo_logger",
            "hailo_apps.python.core.common.buffer_utils",
            "hailo_apps.python.pipeline_apps",
            "hailo_apps.python.pipeline_apps.detection",
            "hailo_apps.python.pipeline_apps.detection.detection_pipeline",
            "pymysql", "pymysql.cursors",
          ]:
            sys.modules.setdefault(name, types.ModuleType(name))
          import ast
          for entry in ("main.py", "main-hailo.py"):
              src = open(entry).read()
              ast.parse(src)
              print(f"OK - {entry} parses ({src.count(chr(10))+1} lines)")
          for f in ["farm_monitor_designer_email.py","flora_agent.py","flora_config.py",
                    "flora_report.py","flora_scheduler.py","flora_tools.py",
                    "meshtastic_flora_bridge.py","farm_monitor_pt_scan.py"]:
              ast.parse(open(f).read())
              print(f"OK - {f} parses")
          PY
