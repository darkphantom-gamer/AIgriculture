name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-smoke:
    name: Lint + import smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install minimal deps (web + config only, no hardware)
        run: |
          python -m pip install --upgrade pip
          pip install fastapi 'uvicorn[standard]' python-multipart PyJWT bcrypt PyYAML

      - name: Compile-check every Python file
        run: python -m compileall -q aigriculture

      - name: Import smoke test (no Pi hardware, no ML deps)
        run: |
          python - <<'PY'
          import sys
          # Stub heavy/hardware modules so the package imports cleanly in CI.
          stubs = [
            "lgpio", "smbus2", "picamera2", "cv2", "numpy", "ultralytics",
            "openai", "meshtastic", "meshtastic.tcp_interface", "pubsub",
            "apscheduler", "reportlab", "hailo_platform",
          ]
          import types
          for name in stubs:
            sys.modules.setdefault(name, types.ModuleType(name))
          # Verify our core wires up without raising.
          from aigriculture import config
          from aigriculture.hardware import wiring
          from aigriculture.hardware.gpio import RelayController
          from aigriculture.hardware.moisture import MoistureSensors
          from aigriculture.irrigation import IrrigationEngine
          from aigriculture.state import AppState
          from aigriculture.web.app import create_app
          assert wiring.relay_pins(), "wiring defaults missing"
          assert isinstance(config.PLANTS, list) and config.PLANTS, "PLANTS empty"
          print("OK - import + wiring sanity passes")
          PY

  docker-build:
    name: Docker image build (no push)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build image (cached layers only)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: aigriculture:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
