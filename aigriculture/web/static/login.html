<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AIgriculture — Sign in</title>
<style>
  :root { --bg:#0d1411; --card:#15201b; --line:#27382e; --green:#36c47a; --text:#e6efe9; --muted:#8aa496; }
  * { box-sizing: border-box; }
  body { margin:0; min-height:100vh; display:grid; place-items:center; background:
    radial-gradient(1200px 600px at 50% -10%, #16261d, var(--bg)); color:var(--text);
    font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; }
  .card { width:min(92vw,380px); background:var(--card); border:1px solid var(--line);
    border-radius:16px; padding:32px 28px; box-shadow:0 20px 60px rgba(0,0,0,.4); }
  .brand { display:flex; align-items:center; gap:10px; font-size:1.4rem; font-weight:700; margin-bottom:4px; }
  .brand span { color:var(--green); }
  .sub { color:var(--muted); font-size:.85rem; margin-bottom:24px; }
  label { display:block; font-size:.8rem; color:var(--muted); margin:14px 0 6px; }
  input { width:100%; padding:11px 13px; background:#0e1714; border:1px solid var(--line);
    border-radius:9px; color:var(--text); font-size:.95rem; }
  input:focus { outline:none; border-color:var(--green); }
  button { width:100%; margin-top:22px; padding:12px; border:0; border-radius:9px;
    background:var(--green); color:#04140c; font-weight:700; font-size:.95rem; cursor:pointer; }
  button:hover { filter:brightness(1.08); }
  .err { color:#ff7a7a; font-size:.83rem; min-height:1.1em; margin-top:12px; text-align:center; }
</style>
</head>
<body>
  <form class="card" id="form">
    <div class="brand">🌱 AI<span>griculture</span></div>
    <div class="sub">Smart farm control panel</div>
    <label for="u">Username</label>
    <input id="u" name="username" autocomplete="username" required autofocus>
    <label for="p">Password</label>
    <input id="p" name="password" type="password" autocomplete="current-password" required>
    <button type="submit">Sign in</button>
    <div class="err" id="err"></div>
  </form>
<script>
  const form = document.getElementById('form'), err = document.getElementById('err');
  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    err.textContent = '';
    const body = new URLSearchParams({ username: form.username.value, password: form.password.value });
    try {
      const r = await fetch('/auth/login', { method:'POST', body });
      if (r.ok) { location.href = '/'; return; }
      const j = await r.json().catch(() => ({}));
      err.textContent = j.error || 'Sign in failed.';
    } catch { err.textContent = 'Network error.'; }
  });
</script>
</body>
</html>
