# AIgriculture · example config
# ------------------------------
# Copy this file to `config.yaml` and fill in your own values.
# `config.yaml` is git-ignored, so your secrets never leave the Pi.
#
# Tip: you can also put any of these under environment variables —
# the app reads env first, then this file, then sensible defaults.

smtp:
  # Use Gmail (App Password) or any SMTP server you trust (Hostinger, SES, etc.)
  host: smtp.gmail.com
  port: 587
  email: ${SMTP_EMAIL}              # your sending address
  password: ${SMTP_PASSWORD}        # Gmail App Password (16 chars, no spaces) or SMTP password
  from_email: ${SMTP_EMAIL}         # usually the same as `email`

notifications:
  # Where alert / report emails are delivered.
  to_email: ${NOTIFY_EMAIL}

app:
  # Public URL of your dashboard. Used inside email links.
  dashboard_url: http://localhost:8000
  camera_id: 0                  # /dev/video0 by default — see --input flag
  conf_thresh: 0.4
  batch_size: 10
  capture_interval_sec: 0.2
  batch_period_sec: 12
  blur_threshold: 35.0
  brightness_min: 35.0
  brightness_max: 225.0
