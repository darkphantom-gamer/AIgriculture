# AIgriculture · wiring overrides (OPTIONAL)
# -------------------------------------------
# Copy this file to `wiring.yaml` to override the hardware pins / I2C
# addresses without editing plantwatch.py.
#
#   cp wiring.example.yaml wiring.yaml
#
# `wiring.yaml` is git-ignored so your map stays on your Pi.
# Any section you leave out falls back to the same default values that
# plantwatch.py has used for years (so the file is entirely optional).

relays:
  # Active-LOW relay boards (most common HW-484 / SongLe modules) → LOW = ON.
  # If your board lights up the relay when the GPIO is HIGH, set this false.
  active_low: true

  # BCM pin per pump. Plant letters a-h map to the same letters used in
  # the dashboard URL (/pump/a/on etc.).
  pins:
    a: 17
    b: 27
    c: 22
    d: 23
    e: 5
    f: 6
    g: 13
    h: 19

buzzers:
  # Two passive piezo buzzers driven together as a stereo siren.
  pins: [18, 12]
  freq_hz: 2700        # warning tone — same for any threat
  on_s: 0.25           # beep length
  off_s: 0.20          # silence between beeps

moisture:
  # Two ADS1115 ADC chips, four channels each → 8 capacitive sensors total.
  # Most boards are 0x48 (ADDR→GND) and 0x49 (ADDR→VDD). Other valid values
  # are 0x4A (ADDR→SDA) and 0x4B (ADDR→SCL).
  ads_addr:   0x48
  ads_addr_2: 0x49

  # Calibration. Raw 16-bit ADS1115 readings:
  #   dry_value → sensor in air     (higher number)
  #   wet_value → sensor in water   (lower  number)
  # Tune these against your own sensor with a glass of water for accuracy.
  dry_value: 17408
  wet_value: 7569
